<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Sign in • Meeting Intelligence</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="stylesheet" href="styles.css" />
  <link
    rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
    integrity="sha512-DTOQO9RWCH3ppGqcWaEA1BIZOC6xxalwEsw9c2QQeAIftl+Vegovlnee1c9QX4TctnWMn13TZye+giMm8e2LwA=="
    crossorigin="anonymous"
    referrerpolicy="no-referrer"
  />
  <style>
    .auth-wrap { max-width: 520px; margin: 12vh auto 0; }
    .auth-card { padding: 18px; }
    .auth-title { font-size: 1.2rem; margin: 0 0 6px; }
    .auth-sub { margin: 0 0 14px; color: var(--text-muted); font-size: 0.9rem; }
    .field { display: flex; flex-direction: column; gap: 6px; margin: 12px 0; }
    .field label { font-size: 0.85rem; color: var(--text-muted); }
    .field input {
      width: 100%;
      padding: 10px 12px;
      border-radius: 12px;
      border: 1px solid rgba(55, 65, 81, 0.95);
      background: rgba(15, 23, 42, 0.95);
      color: var(--text-primary);
      outline: none;
    }
    .auth-actions { display: flex; gap: 10px; margin-top: 14px; }
    .hint { font-size: 0.82rem; color: var(--text-muted); margin-top: 10px; line-height: 1.4; }
  </style>
</head>
<body>
  <div class="app auth-wrap">
    <header class="header" style="justify-content:center;">
      <div>
        <h1 class="auth-title">Meeting Intelligence</h1>
        <p class="auth-sub">Sign in to personalize delivery destinations.</p>
      </div>
    </header>

    <main class="panel auth-card">
      <h2><i class="fa-solid fa-user-lock"></i> Sign in / Sign up</h2>
      <div class="field">
        <label for="email">Email</label>
        <input id="email" type="email" placeholder="name@example.com" />
      </div>
      <div class="auth-actions">
        <button id="continue" class="primary-btn" type="button">
          <i class="fa-solid fa-right-to-bracket"></i> Continue
        </button>
        <a class="secondary-btn" href="/" style="text-decoration:none;">
          Skip
        </a>
      </div>
      <div class="hint">
        This is a lightweight hackathon login screen (client-side only). For now, the backend auto-sends the meeting email to the configured recipient after processing audio.
      </div>
    </main>
  </div>

  <script>
    const emailInput = document.getElementById("email");
    const btn = document.getElementById("continue");

    btn.addEventListener("click", () => {
      const email = (emailInput.value || "").trim();
      if (!email || !email.includes("@")) {
        alert("Please enter a valid email address.");
        return;
      }
      localStorage.setItem("mi_user_email", email);
      window.location.href = "/";
    });
  </script>
</body>
</html>
